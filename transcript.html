<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA to RNA, mRNA, and tRNA Transcription</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1 class="fade-in">DNA to mRNA and tRNA Transcription</h1>
    </header>
    <div class="container">
        <label>Enter DNA Sequence:</label>
        <textarea id="DnaSequence" class="input-field large-textarea" placeholder="ATCG..." required></textarea>
        <button onclick="transcribeDNA()" class="btn">Transcribe</button>
        <p><strong>mRNA Sequence:</strong> <span id="mrnaResult"></span></p>
        <p><strong>tRNA Sequence:</strong> <span id="trnaResult"></span></p>
    </div>

</html>
